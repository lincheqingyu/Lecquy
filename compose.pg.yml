services:
  postgres:
    image: postgres:16
    container_name: webclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webclaw
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webclaw"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - webclaw_postgres_data:/var/lib/postgresql/data

volumes:
  webclaw_postgres_data:
